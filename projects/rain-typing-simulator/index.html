  <title>Rain Typing Simulator</title>
  <style>
    :root { color-scheme: dark; }

    h1 { margin: 0 0 8px; font-size: clamp(32px, 7vw, 58px); letter-spacing: -.04em; }

  <main class="card">
    <h1>Rain Typing Simulator</h1>
    <div class="cn">淋雨模拟打字</div>

    <p>你可以直接下载程序运行，也可以查看源码目录自行编译。</p>
    <div class="actions">
