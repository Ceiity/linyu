<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>淋雨控制台</title>
  <link rel="icon" href="/assets/linyu-robot.svg" type="image/svg+xml">
  <meta name="theme-color" content="#111111">
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <div id="login" class="login-screen">
    <div class="login-card">
      <div class="brand-mark logo-mark"><img src="/assets/linyu-robot.svg" alt="淋雨机器人商标"></div>
      <h1>淋雨控制台</h1>
      <p>管理 AstrBot 与 NapCat 机器人，从这里开始。</p>
      <label>账号<input id="loginUser" autocomplete="off" spellcheck="false" placeholder="请输入面板账号"></label>
      <label>密码<input id="loginPass" type="password" autocomplete="off" placeholder="请输入面板密码"></label>
      <button class="primary wide" onclick="login()">进入面板</button>
      <div id="loginMsg" class="muted"></div>
    </div>
  </div>

  <div id="app" class="app hidden">
    <aside class="sidebar">
      <div class="side-brand" onclick="go('dashboard')"><div class="brand-mark small logo-mark"><img src="/assets/linyu-robot.svg" alt="淋雨"></div><div><b>淋雨</b><span>AstrBot Panel</span></div></div>
      <nav id="nav"></nav>
    </aside>
    <header class="topbar">
      <button class="icon-btn mobile-only" onclick="toggleDrawer()" aria-label="打开菜单">☰</button>
      <div><h2 id="pageTitle">淋雨-仪表盘</h2><span id="pageSub">系统总览</span></div>
      <div class="top-actions">
        <span id="globalStatus" class="status-pill grey">检测中</span>
        <button class="ghost" onclick="refresh(true)">刷新</button>
        <button class="ghost" onclick="toggleTheme()">主题</button>
      </div>
    </header>
    <main id="content" class="content"></main>
    <nav id="bottomNav" class="bottom-nav"></nav>
  </div>

  <div id="modal" class="modal hidden"><div class="modal-card"><div id="modalBody"></div><div class="modal-actions"><button onclick="closeModal()">取消</button><button id="modalOk" class="danger">确认</button></div></div></div>
  <div id="toast" class="toast"></div>
  <script src="/assets/app.js"></script>
</body>
</html>
